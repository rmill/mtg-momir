<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>The Momir Machine</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%;
  overflow: hidden;
  touch-action: none;
}
body {
  font-family: 'Georgia', serif;
  background: radial-gradient(ellipse at 50% 80%, #0d1b2a 0%, #050a12 100%);
  color: #e0e0e0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* Particle background */
.particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}
.particle {
  position: absolute;
  width: 3px;
  height: 3px;
  background: #4fc3a0;
  border-radius: 50%;
  opacity: 0;
  animation: float 6s infinite;
}
@keyframes float {
  0% { opacity: 0; transform: translateY(100vh) scale(0); }
  10% { opacity: 0.8; }
  90% { opacity: 0.4; }
  100% { opacity: 0; transform: translateY(-20vh) scale(1.5); }
}

/* Title */
.title {
  position: fixed;
  top: 2rem;
  font-size: 0.7rem;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: #4fc3a055;
}

/* The Orb */
#orb-container {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
#orb {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #1a4a3a, #0a1f1a 60%, #050f0a);
  border: 2px solid #4fc3a044;
  box-shadow: 0 0 30px #4fc3a022, inset 0 0 40px #4fc3a011;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: grab;
  user-select: none;
  transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
  position: relative;
}
#orb.charging {
  border-color: #4fc3a0;
  box-shadow: 0 0 60px #4fc3a066, 0 0 120px #4fc3a033, inset 0 0 60px #4fc3a033;
  animation: rumble 0.05s infinite alternate;
}
#orb.charging .orb-number {
  text-shadow: 0 0 20px #4fc3a0, 0 0 40px #4fc3a0;
}
@keyframes rumble {
  from { transform: translate(-1px, -1px); }
  to { transform: translate(1px, 1px); }
}
#orb.burst {
  animation: burst 0.4s forwards;
}
@keyframes burst {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.8); opacity: 0.5; }
  100% { transform: scale(0); opacity: 0; }
}
.orb-number {
  font-size: 3.5rem;
  font-weight: bold;
  color: #4fc3a0;
  text-shadow: 0 0 10px #4fc3a044;
  pointer-events: none;
}
.orb-hint {
  position: absolute;
  bottom: -2rem;
  font-size: 0.6rem;
  color: #4fc3a044;
  letter-spacing: 0.2em;
  pointer-events: none;
}

/* Card reveal */
#card-container {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 10;
  overflow: visible;
}
#card-wrapper {
  position: relative;
  width: 280px;
  transform: translateY(0);
  transition: transform 0.8s ease-in;
}
#card-wrapper.flyaway {
  transform: translateY(-120vh);
}
#card-color, #card-dithered {
  width: 100%;
  border-radius: 8px;
  box-shadow: 0 0 60px #4fc3a044;
  opacity: 0;
  transition: opacity 0.4s;
}
#card-color.visible, #card-dithered.visible {
  opacity: 1;
}
#card-dithered {
  position: absolute;
  top: 0;
  left: 0;
  transition: opacity 1.5s;
  image-rendering: pixelated;
}

/* Card name overlay */
#card-name-overlay {
  position: fixed;
  bottom: 3rem;
  font-size: 0.9rem;
  color: #4fc3a0;
  text-align: center;
  opacity: 0;
  transition: opacity 0.4s;
  pointer-events: none;
  text-shadow: 0 0 10px #4fc3a066;
  letter-spacing: 0.05em;
}
#card-name-overlay.visible { opacity: 1; }

/* Orb entrance */
#orb-container.entering {
  animation: enterFromBottom 0.6s ease-out;
}
@keyframes enterFromBottom {
  from { transform: translateY(100vh); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

/* Status */
#status {
  position: fixed;
  bottom: 1rem;
  font-size: 0.6rem;
  color: #4fc3a033;
  letter-spacing: 0.1em;
}
#status.error { color: #e05050aa; }

/* Mode toggle */
#mode-toggle {
  position: fixed;
  top: 1rem;
  right: 1rem;
  font-size: 0.6rem;
  color: #4fc3a033;
  cursor: pointer;
}
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div id="orb-container">
  <div id="orb">
    <span class="orb-number" id="orb-number">5</span>
  </div>
</div>

<div id="card-container">
  <div id="card-wrapper">
    <img id="card-color" alt="">
    <img id="card-dithered" alt="">
  </div>
</div>
<div id="card-name-overlay"></div>

<div id="status">loading...</div>
<div id="mode-toggle">⚙ <span id="mode-text">RAWBT</span></div>
<div style="position:fixed;bottom:1rem;left:1rem;font-size:0.7rem;color:#4fc3a0;letter-spacing:0.1em;">v0.1.3</div>

<canvas id="dither-canvas" style="display:none"></canvas>

<script>
const PRINTER_WIDTH = 576;
const CONTRAST = 1.4;
const CAST_TIME = 1800;
const CMC_MIN = 0;
const CMC_MAX = 16;

let cardData = null;
let cmc = 5;
let mode = localStorage.getItem('momir-mode') || 'rawbt';
let casting = false;
let castTimer = null;
let swipeStartX = 0;
let swipeStartCmc = 0;
let growInterval = null;

document.getElementById('mode-text').textContent = mode.toUpperCase();

// Particles
const particlesEl = document.getElementById('particles');
for (let i = 0; i < 30; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + '%';
  p.style.animationDelay = Math.random() * 6 + 's';
  p.style.animationDuration = (4 + Math.random() * 4) + 's';
  particlesEl.appendChild(p);
}

// Load data
fetch('momir-cards.json')
  .then(r => r.json())
  .then(data => {
    cardData = data;
    setStatus('ready');
  })
  .catch(e => setStatus('failed to load: ' + e.message, true));

function setStatus(msg, err) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = err ? 'error' : '';
}

// Orb swipe
const orb = document.getElementById('orb');
const orbNum = document.getElementById('orb-number');

function updateOrb() {
  orbNum.textContent = cmc;
}

let pointerDown = false;
let hasMoved = false;

orb.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  pointerDown = true;
  hasMoved = false;
  swipeStartX = e.clientX;
  swipeStartCmc = cmc;
  orb.setPointerCapture(e.pointerId);
  startCasting();
});

orb.addEventListener('pointermove', (e) => {
  if (!pointerDown) return;
  const dx = e.clientX - swipeStartX;
  if (Math.abs(dx) > 15) {
    hasMoved = true;
    cancelCasting();
    const steps = Math.round(dx / 40);
    cmc = Math.max(CMC_MIN, Math.min(CMC_MAX, swipeStartCmc - steps));
    updateOrb();
  }
});

orb.addEventListener('pointerup', (e) => {
  pointerDown = false;
  if (hasMoved) cancelCasting();
});

orb.addEventListener('pointercancel', () => {
  pointerDown = false;
  cancelCasting();
});

// Casting (hold)
let castStart = 0;
function startCasting() {
  if (casting) return;
  castStart = Date.now();
  growInterval = setInterval(() => {
    const elapsed = Date.now() - castStart;
    const progress = Math.min(elapsed / CAST_TIME, 1);
    const scale = 1 + progress * 0.4;
    orb.style.transform = `scale(${scale})`;
    if (progress > 0.2) orb.classList.add('charging');
    if (progress >= 1) {
      cancelCasting();
      cast();
    }
  }, 16);
}

function cancelCasting() {
  clearInterval(growInterval);
  orb.classList.remove('charging');
  orb.style.transform = '';
}

// Cast spell
async function cast() {
  if (casting) return;
  casting = true;

  const pool = cardData[String(cmc)];
  if (!pool || pool.length === 0) {
    setStatus('no creatures at cmc ' + cmc, true);
    casting = false;
    return;
  }

  const card = pool[Math.floor(Math.random() * pool.length)];

  // Burst the orb
  orb.classList.add('burst');

  setStatus('summoning ' + card.name + '...');

  try {
    // Load color image
    const img = await loadImage(card.img);

    // Show color card
    const wrapper = document.getElementById('card-wrapper');
    const colorEl = document.getElementById('card-color');
    const ditheredEl = document.getElementById('card-dithered');
    colorEl.src = card.img;
    colorEl.classList.add('visible');

    const nameEl = document.getElementById('card-name-overlay');
    nameEl.textContent = card.name;
    nameEl.className = 'visible';

    // Wait, then crossfade to dithered
    await sleep(1500);
    const ditheredUrl = ditherImage(img);
    ditheredEl.src = ditheredUrl;
    ditheredEl.classList.add('visible');
    colorEl.style.opacity = '0';

    // Print
    if (mode === 'rawbt') {
      setStatus('printing...');
      await printRawBT(ditheredUrl);
    }

    // Fly away
    await sleep(1500);
    wrapper.classList.add('flyaway');
    nameEl.className = '';

    await sleep(800);
    // Reset
    wrapper.classList.remove('flyaway');
    colorEl.classList.remove('visible');
    colorEl.style.opacity = '';
    colorEl.src = '';
    ditheredEl.classList.remove('visible');
    ditheredEl.src = '';

    setStatus('ready');
  } catch (e) {
    setStatus(e.message, true);
  }

  // Bring orb back
  const container = document.getElementById('orb-container');
  orb.classList.remove('burst');
  orb.style.transform = '';
  container.classList.add('entering');
  setTimeout(() => container.classList.remove('entering'), 600);

  casting = false;
}

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('Image load failed'));
    img.src = url;
  });
}

function ditherImage(img) {
  const canvas = document.getElementById('dither-canvas');
  const ratio = PRINTER_WIDTH / img.width;
  const h = Math.round(img.height * ratio);
  canvas.width = PRINTER_WIDTH;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, PRINTER_WIDTH, h);
  const imageData = ctx.getImageData(0, 0, PRINTER_WIDTH, h);
  const pixels = imageData.data;
  const w = PRINTER_WIDTH;
  const gray = new Float32Array(w * h);
  for (let i = 0; i < gray.length; i++) {
    let v = (0.299 * pixels[i*4] + 0.587 * pixels[i*4+1] + 0.114 * pixels[i*4+2]) / 255;
    v = (v - 0.5) * CONTRAST + 0.5;
    gray[i] = Math.max(0, Math.min(1, v)) * 255;
  }
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = y * w + x;
      const old = gray[i];
      const val = old >= 128 ? 255 : 0;
      gray[i] = val;
      const err = old - val;
      if (x + 1 < w) gray[i + 1] += err * 7 / 16;
      if (y + 1 < h) {
        if (x > 0) gray[(y+1)*w + x-1] += err * 3 / 16;
        gray[(y+1)*w + x] += err * 5 / 16;
        if (x + 1 < w) gray[(y+1)*w + x+1] += err * 1 / 16;
      }
    }
  }
  for (let i = 0; i < gray.length; i++) {
    const v = gray[i] >= 128 ? 255 : 0;
    pixels[i*4] = pixels[i*4+1] = pixels[i*4+2] = v;
    pixels[i*4+3] = 255;
  }
  ctx.putImageData(imageData, 0, 0);
  return canvas.toDataURL('image/png');
}

function printRawBT(dataUrl) {
  return new Promise((resolve, reject) => {
    const socket = new WebSocket('ws://localhost:40213/');
    socket.onerror = () => reject(new Error('RawBT not connected'));
    socket.onopen = () => {
      socket.send(JSON.stringify({
        commands: [{ command: 'image', base64: dataUrl.split(',')[1], attributesImage: {} }]
      }));
    };
    socket.onmessage = (event) => {
      const resp = JSON.parse(event.data);
      if (resp.responseType === 'success') { socket.close(); resolve(); }
      else if (resp.responseType === 'error') { socket.close(); reject(new Error(resp.errorMessage)); }
    };
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Mode toggle
document.getElementById('mode-toggle').addEventListener('click', () => {
  mode = mode === 'rawbt' ? 'show' : 'rawbt';
  localStorage.setItem('momir-mode', mode);
  document.getElementById('mode-text').textContent = mode.toUpperCase();
});
</script>
</body>
</html>
